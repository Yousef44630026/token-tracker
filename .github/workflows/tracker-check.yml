name: tracker-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tracker-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check --no-cache tracker tests api

      - name: Permanent falsifying invariants
        shell: pwsh
        run: |
          $tests = @(
            "tests/test_additivity_no_double_count.py",
            "tests/test_event_grain_no_double_count.py",
            "tests/test_storage_no_stored_derived_fields.py",
            "tests/test_stream_supersession_no_double_count.py",
            "tests/test_export_totals_match_model.py",
            "tests/test_context_propagation_async.py"
          )
          # Track failures explicitly: a pwsh step's exit code is the LAST command's,
          # so without this a failing test mid-list is masked by a passing final test.
          $failed = @()
          foreach ($test in $tests) {
            Write-Host "=== $test ==="
            python $test
            if ($LASTEXITCODE -ne 0) { $failed += $test }
          }
          if ($failed.Count -gt 0) {
            Write-Host "FAILED: $($failed -join ', ')"
            exit 1
          }

      - name: Full non-live suite
        run: python tests/run_all.py --skip-lint

      - name: Provider and export verification
        shell: cmd
        run: scripts\tt-verify.cmd
