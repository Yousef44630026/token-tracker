name: tracker-check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tracker-check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev tools
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check --no-cache tracker tests api

      - name: Permanent falsifying invariants
        shell: pwsh
        run: |
          $tests = @(
            "tests/test_additivity_no_double_count.py",
            "tests/test_event_grain_no_double_count.py",
            "tests/test_storage_no_stored_derived_fields.py",
            "tests/test_stream_supersession_no_double_count.py",
            "tests/test_export_totals_match_model.py",
            "tests/test_context_propagation_async.py"
          )
          # Track failures explicitly: a pwsh step's exit code is the LAST command's,
          # so without this a failing test mid-list is masked by a passing final test.
          $failed = @()
          foreach ($test in $tests) {
            Write-Host "=== $test ==="
            python $test
            if ($LASTEXITCODE -ne 0) { $failed += $test }
          }
          if ($failed.Count -gt 0) {
            Write-Host "FAILED: $($failed -join ', ')"
            exit 1
          }

      - name: Full non-live suite
        run: python tests/run_all.py --skip-lint

      - name: Pin interpreter for cmd wrapper scripts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # tt-verify.cmd resolves Python through scripts/_python.cmd, which prefers the Windows
          # `py` launcher over PATH `python`. On the runner `py` points at an interpreter WITHOUT
          # the editable install and its deps, so tt-verify ran different code than the steps above
          # (which call `python` directly) and failed. Pin the override _python.cmd honors first to
          # the interpreter that ran `pip install -e`. Locally the `py` launcher is absent, so
          # _python.cmd already resolves the portable/venv Python and this override never applies.
          "AI_TOKEN_TRACKER_PYTHON=$((Get-Command python).Source)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Provider and export verification
        if: runner.os == 'Windows'
        shell: cmd
        run: scripts\tt-verify.cmd

      - name: Provider and export verification (POSIX)
        if: runner.os != 'Windows'
        run: sh scripts/tt-verify.sh

      - name: Build distributable wheel
        run: python -m pip wheel . --no-deps --wheel-dir wheelhouse

      - name: Verify installed wheel surfaces
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem wheelhouse/*.whl | Select-Object -First 1).FullName
          if (-not $wheel) { throw "wheel build produced no artifact" }
          python -m pip install --force-reinstall --no-deps $wheel
          python -c "import tracker; import api.main; import tracker.export.live_dashboard; import tracker.ops.scale_probe"
          python -m tracker.export.live_dashboard --help
          python -m tracker.ops.scale_probe --help
